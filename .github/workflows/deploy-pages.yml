name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build secret phrases file
        env:
          HOMEPAGE_PHRASES_JSON: ${{ secrets.HOMEPAGE_PHRASES_JSON }}
          HOMEPAGE_PHRASES: ${{ secrets.HOMEPAGE_PHRASES }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const rawJson = (process.env.HOMEPAGE_PHRASES_JSON || '').trim();
          const rawLines = (process.env.HOMEPAGE_PHRASES || '').trim();

          console.log('HOMEPAGE_PHRASES_JSON present:', Boolean(rawJson));
          console.log('HOMEPAGE_PHRASES present:', Boolean(rawLines));

          let phrases = [];
          const raw = rawJson || rawLines;

          if (raw) {
            try {
              if (raw.startsWith('[')) {
                phrases = JSON.parse(raw);
              } else {
                phrases = raw
                  .split(/\r?\n/)
                  .map((line) => line.trim())
                  .filter(Boolean);
              }
            } catch (error) {
              console.error('HOMEPAGE_PHRASES secret is invalid:', error.message);
              process.exit(1);
            }
          }

          if (!Array.isArray(phrases)) {
            console.error('HOMEPAGE_PHRASES must resolve to an array of strings.');
            process.exit(1);
          }

          console.log('Parsed phrases count:', phrases.length);
          console.log('Parsed phrases:', JSON.stringify(phrases));

          fs.writeFileSync(
            'js/phrases-secrets.js',
            `window.HOMEPAGE_PHRASES = ${JSON.stringify(phrases)};\n`
          );
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show deployed URL
        run: |
          echo "Deployed site: https://nereasanlop.github.io/lysm/"

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build secret phrases file
        env:
          HOMEPAGE_PHRASES_JSON: ${{ secrets.HOMEPAGE_PHRASES_JSON }}
        run: |
          if [ -z "$HOMEPAGE_PHRASES_JSON" ]; then
            echo "window.HOMEPAGE_PHRASES = [];" > js/phrases-secrets.js
          else
            printf 'window.HOMEPAGE_PHRASES = %s;\n' "$HOMEPAGE_PHRASES_JSON" > js/phrases-secrets.js
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

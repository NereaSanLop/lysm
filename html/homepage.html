<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Homepage</title>
	<link rel="stylesheet" href="../css/style.css">
	<link rel="stylesheet" href="../css/homepage.css">
</head>
<body>
	<div class="typing-box" aria-live="polite">
		<p id="typedText" class="typed-text"></p>
	</div>
	<div id="playlistPanel" class="playlist-panel" hidden>
		<iframe
			id="playlistFrame"
			class="playlist-frame"
			title="Reproductor de playlist de YouTube"
			loading="lazy"
			allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
			allowfullscreen>
		</iframe>
	</div>
	<img class="corner-gif" src="../img/cinamonroll.gif" alt="Cinnamoroll animado">
	<script src="../js/phrases-secrets.js"></script>
	<script src="../js/homepage.js"></script>
</body>
</html>
